apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: product-cluster
  region: us-east-1
  version: "1.32"

# managed node group
managedNodeGroups:
  - name: product-nodes
    instanceType: t3.medium
    minSize: 2
    maxSize: 4
    desiredCapacity: 2
    volumeSize: 20
    volumeType: gp3
    iam:
      withAddonPolicies:
        albIngress: true
        ebs: true

# add-ons
addons:
  - name: aws-ebs-csi-driver
    version: latest
